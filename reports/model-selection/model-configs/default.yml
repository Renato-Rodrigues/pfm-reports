# PFM Model Selection — Model Configuration
#
# Each entry defines one model specification to test.
#
# Required fields:
#   name                      Display name shown in tables and plots
#   phases                    Phase group(s) this model belongs to (organises comparison tables)
#   actorPowerDrivers         Actor power predictor variable(s)
#   actorPowerIndex           Actor Power Index variable name(s) (composite or split)
#   instQualityDrivers        Institutional quality predictor variable(s)
#   controlDrivers            Control predictor variable(s)
#   includeLagged             true to add lagged adoption and lagged ECP as predictors
#   interactRegionFE          true to interact region FE with actor power drivers
#   regionMappingFixedEffects Mapping CSV file for region fixed effects, or ~ for none
#
# Optional fields:
#   description               Markdown text shown in the Forest Plots tab

- name: "Baseline"
  phases:
    - "Phase 1: Base Model Assumptions"
    - "Phase 2: Institutional Quality"
    - "Phase 3: Regional Fixed Effects"
  description: |
    **What it does:** Uses a single composite Actor Power Index.

    **Assumption:** Actor power operates symmetrically (a 1-unit increase in Innovator Power
    perfectly cancels out a 1-unit increase in Incumbent Power). Institutional quality interacts
    globally with this net power.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: false
  interactRegionFE: false
  regionMappingFixedEffects: "regionmappingH12.csv"

- name: "Split Variables"
  phases:
    - "Phase 1: Base Model Assumptions"
  description: |
    **What it does:** Replaces the combined index with discrete components.

    **Assumption:** Incumbents and Innovators exert asymmetric power dynamics over policy adoption.
  actorPowerDrivers:
    - "Innovator Power"
    - "Incumbent Power"
  actorPowerIndex:
    - "Innovator Power"
    - "Incumbent Power"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: false
  interactRegionFE: false
  regionMappingFixedEffects: "regionmappingH12.csv"

- name: "Advanced Controls"
  phases:
    - "Phase 1: Base Model Assumptions"
  description: |
    **What it does:** Expands the structural controls.

    **Assumption:** Broader macroeconomic and demographic factors drive feasibility.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
  controlDrivers:
    - "GDP per Capita"
    - "Energy Intensity"
    - "Urban Population Share"
    - "Hydro Nuclear Share"
  includeLagged: false
  interactRegionFE: false
  regionMappingFixedEffects: "regionmappingH12.csv"

- name: "Non-Linear Dynamics"
  phases:
    - "Phase 1: Base Model Assumptions"
  description: |
    **What it does:** Includes a squared term for GDP per Capita.

    **Assumption:** The Environmental Kuznets Curve hypothesis applies to pricing adoption.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
  controlDrivers:
    - "GDP per Capita Sq"
    - "Hydro Nuclear Share"
  includeLagged: false
  interactRegionFE: false
  regionMappingFixedEffects: "regionmappingH12.csv"

- name: "Heterogeneous Regional Effects"
  phases:
    - "Phase 1: Base Model Assumptions"
  description: |
    **What it does:** Interacts Region Fixed Effects with structural drivers.

    **Assumption:** The impact of actor power and institutional quality varies intrinsically by region.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: false
  interactRegionFE: true
  regionMappingFixedEffects: "regionmappingH12.csv"

- name: "Path Dependency"
  phases:
    - "Phase 1: Base Model Assumptions"
  description: |
    **What it does:** Introduces lagged adoption/price stringency.

    **Assumption:** Policy adoption strongly correlates with historical status (inertia).
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: true
  interactRegionFE: false
  regionMappingFixedEffects: "regionmappingH12.csv"

- name: "Institutional Quality - Rule of Law"
  phases:
    - "Phase 2: Institutional Quality"
  description: |
    **What it does:** Introduces the V-Dem Rule of Law indicator alongside Government Effectiveness.

    **Assumption:** Test alternative institutional quality indicators.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
    - "Rule of Law (VDem)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: false
  interactRegionFE: false
  regionMappingFixedEffects: "regionmappingH12.csv"

- name: "Institutional Quality - Diagonal Accountability"
  phases:
    - "Phase 2: Institutional Quality"
  description: |
    **What it does:** Introduces the V-Dem Diagonal Accountability indicator (media & CSOs monitoring).

    **Assumption:** Non-electoral public scrutiny exposes incumbent lobbying.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
    - "Diagonal Accountability (VDem)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: false
  interactRegionFE: false
  regionMappingFixedEffects: "regionmappingH12.csv"

- name: "Institutional Quality - Diagonal & Vertical Accountability"
  phases:
    - "Phase 2: Institutional Quality"
  description: |
    **What it does:** Introduces V-Dem Diagonal & Vertical Accountability indicators.

    **Assumption:** Combines media scrutiny with electoral pressure at the ballot box.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
    - "Diagonal Accountability (VDem)"
    - "Vertical Accountability (VDem)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: false
  interactRegionFE: false
  regionMappingFixedEffects: "regionmappingH12.csv"

- name: "Institutional Quality - Full Accountability"
  phases:
    - "Phase 2: Institutional Quality"
  description: |
    **What it does:** Introduces all three V-Dem Accountability indicators (Vertical, Horizontal, Diagonal).

    **Assumption:** Test the full interactive accountability system.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
    - "Vertical Accountability (VDem)"
    - "Horizontal Accountability (VDem)"
    - "Diagonal Accountability (VDem)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: false
  interactRegionFE: false
  regionMappingFixedEffects: "regionmappingH12.csv"

- name: "Institutional Quality - VDem"
  phases:
    - "Phase 2: Institutional Quality"
  description: |
    **What it does:** Introduces all V-Dem institutional quality indicators.

    **Assumption:** Test the full suite of alternative institutional quality indicators.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
    - "Rule of Law (VDem)"
    - "Vertical Accountability (VDem)"
    - "Horizontal Accountability (VDem)"
    - "Diagonal Accountability (VDem)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: false
  interactRegionFE: false
  regionMappingFixedEffects: "regionmappingH12.csv"

- name: "Region FE - EU/OECD+"
  phases:
    - "Phase 3: Regional Fixed Effects"
  description: |
    **What it does:** Uses a specialised region mapping for fixed effects (EU, OECD+, Rest of World).

    **Assumption:** Policy dynamics are clustered in these macro-regions.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: true
  interactRegionFE: false
  regionMappingFixedEffects: "regionmapping_EU_OECDp.csv"

- name: "Region FE - None"
  phases:
    - "Phase 3: Regional Fixed Effects"
  description: |
    **What it does:** Disables region fixed effects entirely.

    **Assumption:** Eliminating region fixed effects highlights global drivers.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: true
  interactRegionFE: false
  regionMappingFixedEffects: ~

- name: "Region FE - 54 Regions"
  phases:
    - "Phase 3: Regional Fixed Effects"
  description: |
    **What it does:** Uses 54 native regions for fixed effects.

    **Assumption:** Highly granular regional effects isolate country-level variations better.
  actorPowerDrivers:
    - "Actor Power Index"
  actorPowerIndex:
    - "Actor Power Index"
  instQualityDrivers:
    - "Government Effectiveness (WGI)"
  controlDrivers:
    - "GDP per Capita"
    - "Hydro Nuclear Share"
  includeLagged: true
  interactRegionFE: false
  regionMappingFixedEffects: "regionmapping_54.csv"
